<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Sécurisé</title>
    <!-- Importation d'une police moderne (Poppins) similaire à celle des applications FinTech -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --flouci-yellow: #FFC300; /* Code couleur jaune style Flouci */
            --flouci-dark: #121212;
            --flouci-bg: #F5F6F8;
            --text-muted: #6B7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--flouci-bg);
            color: var(--flouci-dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Design de la carte (style application mobile) */
        .card {
            background: #FFFFFF;
            width: 100%;
            max-width: 380px;
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.04);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Ligne décorative en haut de la carte */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background-color: var(--flouci-yellow);
        }

        /* Faux logo pour rappeler l'application */
        .logo {
            width: 56px;
            height: 56px;
            background-color: var(--flouci-yellow);
            color: var(--flouci-dark);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            font-weight: 700;
            margin: 0 auto 24px auto;
            box-shadow: 0 4px 10px rgba(255, 195, 0, 0.3);
        }

        h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--flouci-dark);
        }

        p {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
            font-weight: 400;
        }

        /* Section des boutons */
        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: transform 0.2s ease;
            border: none;
            cursor: pointer;
            color: white;
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-discord {
            background-color: #5865F2; /* Bleu Discord */
        }

        .btn-instagram {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); /* Dégradé Insta */
        }

        /* Footer avec le nom */
        .footer {
            margin-top: 40px;
            font-size: 13px;
            font-weight: 500;
            color: #A0AABF;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="logo">F</div>
        <h1>Numéro Masqué</h1>
        <p>Pour des raisons de sécurité, mon numéro de téléphone est disponible uniquement en message privé sur les réseaux suivants :</p>
        
        <div class="btn-container">
            <!-- Tu peux remplacer le "#" par le lien vers ton profil Discord ou Insta -->
            <a href="#" class="btn btn-discord">M'envoyer un DM Discord</a>
            <a href="#" class="btn btn-instagram">Me DM sur Instagram</a>
        </div>
    </div>

    <div class="footer">
        jameleddine rouis
    </div>

</body>
</html>
